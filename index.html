<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio Criativo</title>
    <!-- Google Fonts: Montserrat para títulos e Open Sans para corpo -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --accent-color: #fdf079;
            --bg-color: #1a1919;
            --text-dark: #ffffff;
            --text-light: #636e72;
            --glass-bg: rgba(53, 52, 52, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1, h2, h3 {
            font-family: 'Montserrat', sans-serif;
        }

        /* Elementos Decorativos de Fundo */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Seção Herói */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            position: relative;
        }

        .hero-content {
            max-width: 550px;
        }

        .hero-content h1 {
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .hero-content h1 span {
            color: var(--primary-color);
            display: block;
        }

        .hero-content p {
            font-size: 1.4rem;
            color: var(--text-light);
            border-left: 5px solid var(--accent-color);
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .hero-image-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: morph 8s ease-in-out infinite;
            border: 8px solid #fdf079;
        }

        @keyframes morph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Seção Paralaxe / Coisas que Gosto */
        .interests-section {
            position: relative;
            background: rgb(25, 24, 24);
            padding: 120px 0;
            margin-top: -50px; /* Efeito de sobreposição */
            border-radius: 80px 80px 0 0;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-header h2 {
            font-size: 3rem;
            position: relative;
            display: inline-block;
        }

        .section-header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60%;
            height: 8px;
            background: var(--accent-color);
            border-radius: 4px;
        }

        /* Carrossel Estilizado */
        .carousel-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 30px;
            color: #1a1a1a;
        }

        .carousel-track {
            display: flex;
            width: 400%;
            animation: slide 20s infinite;
        }

        .carousel-item {
            width: 25%;
            padding: 20px;
            position: relative;
        }

        .card {
            background: rgb(0, 0, 0);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }

        .card-info {
            padding: 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .card-info h3 {
            color: var(--text-dark);
            font-size: 1.5rem;
        }

        @keyframes slide {
            0% { transform: translateX(0); }
            20% { transform: translateX(0); }
            25% { transform: translateX(-25%); }
            45% { transform: translateX(-25%); }
            50% { transform: translateX(-50%); }
            70% { transform: translateX(-50%); }
            75% { transform: translateX(-75%); }
            95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }

        /* Rodapé Estilo Dark Moderno */
        footer {
            background: #1a1a1a;
            color: white;
            padding: 100px 10% 50px;
            text-align: center;
            border-radius: 80px 80px 0 0;
            margin-top: -40px;
            position: relative;
            z-index: 11;
        }

        .footer-content h2 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .footer-content p {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .social-links a {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: white;
            font-size: 1.8rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-links a:hover {
            background: var(--primary-color);
            transform: rotate(360deg) scale(1.1);
        }

        .copyright {
            margin-top: 80px;
            font-size: 0.9rem;
            opacity: 0.4;
        }

        /* Responsividade */
        @media (max-width: 992px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 100px;
            }
            .hero-content h1 {
                font-size: 3.5rem;
            }
            .hero-image-container {
                width: 300px;
                height: 300px;
                margin-top: 50px;
            }
            .card-info {
                bottom: 30px;
                left: 30px;
                right: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <!-- Seção Herói -->
    <section class="hero">
        <div class="hero-content">
            <h1>Olá, eu sou <span>gege</span></h1>
            <p>"So estou andando por ai pra descobrir oq eu quero da vida"</p>
        </div>
        <div class="hero-image-container">
            <div class="hero-image">
                <img src="./Mídia (2).jpeg" alt="Foto do Aluno">
            </div>
        </div>
    </section>

    <!-- Seção Coisas que Gosto -->
    <section class="interests-section">
        <div class="section-header">
            <h2>Coisas que gosto de fazer</h2>
        </div>
        
        <div class="carousel-container">
            <div class="carousel-track">
                <!-- Item 1 -->
                <div class="carousel-item">
                    <div class="card">
                        <img src="./Mídia (2).jpeg" alt="Código">
                        <div class="card-info">
                            <h3>gosto desenhar uns negocio</h3>
                        </div>
                    </div>
                </div>
                <!-- Item 2 -->
                <div class="carousel-item">
                    <div class="card">
                        <img src="./30praum-.webp" alt="Música">
                        <div class="card-info">
                            <h3>Ouça umas musicas tbm</h3>
                        </div>
                    </div>
                </div>
                <!-- Item 3 -->
                <div class="carousel-item">
                    <div class="card">
                        <img src="./snc.jpg"Natureza">
                        <div class="card-info">
                            <h3>vejo series por ai</h3>
                        </div>
                    </div>
                </div>
                <!-- Item 4 -->
                <div class="carousel-item">
                    <div class="card">
                        <img src="./rdr.avif" alt="Games">
                        <div class="card-info">
                            <h3>Jogar alguns jogos</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Rodapé -->
    <footer>
        <div class="footer-content">
            <h2>gege</h2>
            <p>Vamos criar algo incrível juntos?</p>
            <div class="social-links">
                <a href="https://github.com/"><i class="fab fa-github"></i></a>
                <a href="https://br.linkedin.com/"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://www.instagram.com/giovanech/"><i class="fab fa-instagram"></i></a>
                <a href="https://web.whatsapp.com/"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
        <p class="copyright">&copy; 2024 • Design by Aluno Criativo</p>
    </footer>
